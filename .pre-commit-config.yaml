default_stages: [pre-commit]

repos:
  # Common pre-commit hooks for general code hygiene and best practices
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      # Prevent committing large files that might have been added by mistake
      - id: check-added-large-files
      - id: check-toml

  # Linting YAML files
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        # Uses -d to specify a custom configuration inline instead of a separate .yamllint file
        # This configuration uses the "relaxed" preset but overrides the line-length rule to allow lines up to 120 characters
        args: ["-d", "{extends: relaxed, rules: {line-length: {max: 120}}}"]

  # Formatting and linting TOML files
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  # Dockerfile analysis and best practices
  - repo: https://github.com/coatl-dev/hadolint-coatl
    rev: 2.14.0
    hooks:
      - id: hadolint

  # Python code formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Commit message linting using conventional commit standards
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
